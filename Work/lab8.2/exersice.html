<!doctype html>
<!--
Example Canvas Animation
Sam Scott, McMaster, 2024
-->
<html>
  <head>
    <title>Example Canvas Animation</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <script type="text/javascript">
      // Following best practices, it's all inside a window load event
      window.addEventListener("load", function (event) {
        // global variables (global to this function, that is)
        // to control the animation
        const ball = {
          x: 50,
          y: 50,
          xSpeed: 1,
          ySpeed: 1,
          red: 0,
          green: 0,
          blue: 0,
          radius: 20,
        };

        let timerId; // holds the id of the timer

        const c = document.getElementById("animationCanvas");
        const ctx = c.getContext("2d");

        // starts the animation
        function startAnimation() {
          // 16 milliseconds works out to 62.5 frames per second.
          // for games, 60 frames per second is standard
          timerId = setInterval(updateAnimation, 16);
          console.log("Animation Started");
        }

        // stops the animation
        function stopAnimation() {
          clearInterval(timerId);
          console.log("Animation Stopped");
        }

        // This function is called every 16 milliseconds
        function updateAnimation() {
          // 1. Update the position of the ball
          ball.x = ball.x + ball.xSpeed;
          ball.y = ball.y + ball.ySpeed;

          // 2. Make the ball shrink as it moves
          ball.radius = ball.radius - 0.05;

          // 3. Make the ball go from black to red
          if (ball.red < 255) {
            ball.red = ball.red + 1;
          }

          // 4. Clear the canvas
          ctx.clearRect(0, 0, c.width, c.height);

          // 5. Draw the frame using information stored in ball
          ctx.fillStyle =
            "rgb(" + ball.red + "," + ball.green + "," + ball.blue + ")";
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
          ctx.closePath();
          ctx.fill();

          // 6. Collision detection: stop the animation if the ball is at the edge of the canvas
          if (
            ball.x >= c.width - ball.radius ||
            ball.x <= ball.radius ||
            ball.y >= c.height - ball.radius ||
            ball.y <= ball.radius ||
            ball.radius <= 0
          ) {
            stopAnimation();
          }
        }

        // Start things up!
        startAnimation();
      });
    </script>
  </head>

  <body style="text-align: center">
    <canvas
      id="animationCanvas"
      width="768"
      height="400"
      style="background-color: black"
    ></canvas>
  </body>
</html>
