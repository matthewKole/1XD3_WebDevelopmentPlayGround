<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>City Population Search</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      max-width: 800px;
    }

    h2 { margin-bottom: 16px; }

    /* ── Form layout ── */
    .form-row {
      display: flex;
      gap: 16px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label { font-weight: bold; font-size: 0.9rem; }

    input[type="number"] {
      padding: 8px;
      font-size: 1rem;
      width: 160px;
      border: 1px solid #aaa;
      border-radius: 4px;
    }

    button {
      padding: 8px 20px;
      font-size: 1rem;
      background: #0066cc;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover:not(:disabled)  { background: #0052a3; }
    button:disabled               { background: #999; cursor: not-allowed; }
    input:disabled                { background: #e9e9e9; cursor: not-allowed; }

    /* ── Loading feedback ── */
    #loading {
      display: none;
      margin-top: 20px;
      font-style: italic;
      color: #555;
      align-items: center;
      gap: 10px;
    }

    /* CSS-only spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid #ccc;
      border-top-color: #0066cc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ── */
    #error {
      margin-top: 20px;
      color: red;
      font-weight: bold;
    }

    #results { margin-top: 24px; }

    #results h3 { margin-bottom: 10px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid #ddd;
    }

    th { background: #0066cc; color: #fff; }

    tr:hover td { background: #f0f7ff; }
  </style>
</head>
<body>

  <h2>City Population Search</h2>

  <div class="form-row">
    <div class="form-group">
      <label for="min">Min Population</label>
      <input type="number" id="min" min="0" value="500000" placeholder="e.g. 500000">
    </div>

    <div class="form-group">
      <label for="max">Max Population</label>
      <input type="number" id="max" min="0" value="2000000" placeholder="e.g. 2000000">
    </div>

    <button id="searchBtn" onclick="searchCities()">Search</button>
  </div>

  <!-- Loading indicator (hidden by default) -->
  <div id="loading">
    <div class="spinner"></div>
    <span>Loading cities…</span>
  </div>

  <!-- Error message area -->
  <div id="error"></div>

  <!-- Results table -->
  <div id="results"></div>

  <script>
    async function searchCities() {
      const minInput  = document.getElementById('min');
      const maxInput  = document.getElementById('max');
      const btn       = document.getElementById('searchBtn');
      const loading   = document.getElementById('loading');
      const errorDiv  = document.getElementById('error');
      const resultsDiv= document.getElementById('results');

      const min = minInput.value.trim();
      const max = maxInput.value.trim();

      // Basic client-side validation
      errorDiv.textContent = '';
      resultsDiv.innerHTML = '';

      if (!min || !max) {
        errorDiv.textContent = 'Please enter both a minimum and maximum population.';
        return;
      }
      if (Number(min) > Number(max)) {
        errorDiv.textContent = 'Minimum population cannot be greater than maximum.';
        return;
      }

      // ── Disable inputs & show loading ──
      minInput.disabled = true;
      maxInput.disabled = true;
      btn.disabled      = true;
      loading.style.display = 'flex';

      try {
        const url      = `get_cities.php?min=${encodeURIComponent(min)}&max=${encodeURIComponent(max)}`;
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`Server error: ${response.status}`);
        }

        const cities = await response.json();

        if (cities.error) {
          errorDiv.textContent = 'Server error: ' + cities.error;
        } else if (cities.length === 0) {
          resultsDiv.innerHTML = '<p>No cities found in that population range.</p>';
        } else {
          resultsDiv.innerHTML = buildTable(cities);
        }

      } catch (err) {
        errorDiv.textContent = 'Request failed: ' + err.message;
      } finally {
        // ── Re-enable inputs & hide loading (always) ──
        minInput.disabled = false;
        maxInput.disabled = false;
        btn.disabled      = false;
        loading.style.display = 'none';
      }
    }

    function buildTable(cities) {
      const count = cities.length;
      let html = `<h3>${count} cit${count === 1 ? 'y' : 'ies'} found</h3>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>City</th>
              <th>Country Code</th>
              <th>District</th>
              <th>Population</th>
            </tr>
          </thead>
          <tbody>`;

      cities.forEach((city, i) => {
        const pop = Number(city.Population).toLocaleString();
        html += `<tr>
          <td>${i + 1}</td>
          <td>${escapeHtml(city.Name)}</td>
          <td>${escapeHtml(city.CountryCode)}</td>
          <td>${escapeHtml(city.District)}</td>
          <td>${pop}</td>
        </tr>`;
      });

      html += '</tbody></table>';
      return html;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>

</body>
</html>
